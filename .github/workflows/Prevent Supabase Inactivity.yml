name: Prevent Supabase Inactivity

on:
  schedule:
    - cron: '0 0 * * 0'
  workflow_dispatch:

jobs:
  ping-database:
    runs-on: ubuntu-latest

    steps:
      - name: Ping Supabase
        run: |
          curl -s -o /dev/null -w "%{http_code}" \
          -H "apikey: ${{ secrets.SUPABASE_API_KEY }}" \
          -H "Authorization: Bearer ${{ secrets.SUPABASE_API_KEY }}" \
          "${{ secrets.SUPABASE_URL }}/rest/v1/reviews?select=id&limit=1"
